name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install ruff mypy

      - name: Lint (ruff)
        run: ruff check .

      - name: Format check (ruff, advisory)
        # Advisory until the existing codebase is reformatted in a dedicated pass.
        run: ruff format --check . || true

      - name: Type check (mypy, advisory)
        run: mypy app || true

      - name: Test
        env:
          APP_ENV: test
        run: pytest -q

  # Migrations must apply cleanly on a real Postgres and match the models.
  migrations:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: inwork
        ports: ["5432:5432"]
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s --health-timeout 5s --health-retries 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: Apply migrations
        env:
          APP_ENV: development
          SECRET_KEY: ci-secret-key-not-used-in-prod-0123456789abcdef
          DATABASE_URL: postgresql+psycopg://postgres:postgres@localhost:5432/inwork
        run: alembic upgrade head
